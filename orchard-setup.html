<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orchard Setup — SmartTrap</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg: #f5f6f4; --surface: #ffffff; --border: #e2e5e2;
      --accent: #1a7a3c; --accent2: #2da653; --warn: #b45309;
      --danger: #dc2626; --text: #1a1f1a; --muted: #6b7a6c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .back-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 4px; transition: all 0.15s; }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); }
    .logo { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
    .page-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

    .toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
    .toolbar-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .tool-btn { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding: 7px 16px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tool-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
    .tool-btn.save { background: var(--accent); border-color: var(--accent); color: #fff; margin-left: auto; }
    .tool-btn.save:hover { background: var(--accent2); border-color: var(--accent2); }
    .tool-btn.save:disabled { background: var(--border); border-color: var(--border); color: var(--muted); cursor: not-allowed; }
    .toolbar-divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .toolbar-status { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); padding: 0 4px; }
    .toolbar-status.success { color: var(--accent); }
    .toolbar-status.error   { color: var(--danger); }

    .map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }
    .leaflet-container { font-family: 'DM Sans', sans-serif; }

    .draw-hint { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); background: rgba(26,122,60,0.92); color: #fff; font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 8px 18px; border-radius: 6px; pointer-events: none; white-space: nowrap; display: none; box-shadow: 0 2px 8px rgba(0,0,0,.18); z-index: 1000; }

    .map-legend { position: absolute; bottom: 16px; right: 16px; background: rgba(255,255,255,0.93); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); backdrop-filter: blur(8px); box-shadow: 0 1px 4px rgba(0,0,0,.1); display: flex; flex-direction: column; gap: 6px; pointer-events: none; z-index: 1000; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .leg-line { width:18px;height:3px;background:#FFC72C;border-radius:2px;flex-shrink:0; }
    .leg-radius { width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.08);border:1.5px dashed rgba(255,255,255,0.6);flex-shrink:0; }
    .leg-node { width:10px;height:10px;border-radius:50%;background:var(--danger);border:2px solid white;box-shadow:0 0 0 1px var(--danger);flex-shrink:0; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="back-btn" href="index.html">← Dashboard</a>
    <div class="logo">SmartTrap</div>
  </div>
  <div class="page-label">Orchard Setup</div>
</header>

<div class="toolbar">
  <span class="toolbar-label">Boundary:</span>
  <button class="tool-btn" id="btn-draw" onclick="startDrawing()">✏ Draw Orchard</button>
  <button class="tool-btn danger" id="btn-clear" onclick="clearBoundary()">✕ Clear</button>
  <div class="toolbar-divider"></div>
  <span class="toolbar-label">Coverage:</span>
  <button class="tool-btn active" id="btn-radius" onclick="toggleRadius()">◎ Hide 1-mi Radius</button>
  <div class="toolbar-divider"></div>
  <span class="toolbar-status" id="status"></span>
  <button class="tool-btn save" id="btn-save" onclick="saveBoundary()" disabled>💾 Save Boundary</button>
</div>

<div class="map-wrap">
  <div id="map"></div>
  <div class="draw-hint" id="draw-hint">Click to place boundary points · Double-click to finish</div>
  <div class="map-legend">
    <div class="legend-item"><div class="leg-line"></div> Orchard boundary</div>
    <div class="legend-item"><div class="leg-radius"></div> 1-mile pheromone radius</div>
    <div class="legend-item"><div class="leg-node"></div> Trap node</div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://nqhmvymrikjnkvtxtcst.supabase.co";
  const SUPABASE_KEY = "sb_publishable_e-UEF6y_4kk-QSFb7CfzHQ_lgLVSG6l";
  const ARCGIS_KEY   = "AAPTaVBgWcwmkBkx6iqYw7uXtbQ..Osa6s3wYR1qeRc-FHJv-7xo0qGUcE_UXWBIy5Ugb6hg_DkQRKOfWMrceCvMXt_LcWmXGYoruj5TTc-rTFi58dvkeNDUw28EyxSIBq89chY_-NSW5X56boL-xg2Ikb_NuX21QzxzD4YW8w8bMDICciDZZhbfEfFdyNbrImabIrcBz3oqucBTAdiVVBM9eS9m1APnBewxY5p_D2w-KBJ0LWZyd5qqKXj6L_mqQf-5ebYhe-DILAguQGpyAAT1_EKuxh5JG";
  const DEFAULT_CENTER     = [37.35368, -120.93426];
  const PHEROMONE_RADIUS_M = 1609.34;

  // ── SUPABASE ─────────────────────────────────────────
  async function sbGet(path) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    return res.json();
  }

  async function sbWrite(path, method, body, extra = {}) {
    return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      method,
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", "Prefer": "return=minimal", ...extra },
      body: JSON.stringify(body)
    });
  }

  async function fetchNodeLocations() {
    const rows = await sbGet("node_locations?select=node_id,latitude,longitude");
    const out  = {};
    if (Array.isArray(rows)) rows.forEach(r => { out[r.node_id] = [parseFloat(r.latitude), parseFloat(r.longitude)]; });
    return out;
  }

  async function fetchBoundary() {
    const rows = await sbGet("orchard_boundaries?select=id,polygon_points&order=id.asc&limit=1");
    return Array.isArray(rows) && rows.length > 0 ? rows[0] : null;
  }

  // ── MAP INIT ─────────────────────────────────────────
  const map = L.map("map", { zoomControl: true }).setView(DEFAULT_CENTER, 14);

  L.tileLayer(
    `https://ibasemaps-api.arcgis.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}?token=${ARCGIS_KEY}`,
    { attribution: 'Tiles © <a href="https://www.esri.com/">Esri</a>', maxZoom: 20 }
  ).addTo(map);

  // ── STATE ────────────────────────────────────────────
  let drawingActive = false;
  let clickPoints   = [];       // [{lat, lng}, ...]
  let showRadius    = true;

  // Leaflet layer groups
  const boundaryGroup = L.layerGroup().addTo(map);
  const radiusGroup   = L.layerGroup().addTo(map);
  const nodeGroup     = L.layerGroup().addTo(map);

  // ── UI ───────────────────────────────────────────────
  function setStatus(msg, cls) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className   = "toolbar-status" + (cls ? " " + cls : "");
  }

  function startDrawing() {
    drawingActive = !drawingActive;
    const btn = document.getElementById("btn-draw");
    if (drawingActive) {
      clickPoints = [];
      redraw();
      btn.classList.add("active"); btn.textContent = "⏹ Stop Drawing";
      document.getElementById("draw-hint").style.display = "block";
      map.getContainer().style.cursor = "crosshair";
      setStatus("Click to place points. Double-click to finish.", "");
    } else {
      finishDrawing();
    }
  }

  function finishDrawing() {
    drawingActive = false;
    const btn = document.getElementById("btn-draw");
    btn.classList.remove("active"); btn.textContent = "✏ Draw Orchard";
    document.getElementById("draw-hint").style.display = "none";
    map.getContainer().style.cursor = "";
    redraw();
    if (clickPoints.length >= 3) {
      document.getElementById("btn-save").disabled = false;
      setStatus(`${clickPoints.length} points · ready to save.`, "success");
    } else if (clickPoints.length > 0) {
      setStatus("Need at least 3 points for a valid boundary.", "error");
    } else {
      setStatus("", "");
    }
  }

  function clearBoundary() {
    clickPoints = []; drawingActive = false;
    const btn = document.getElementById("btn-draw");
    btn.classList.remove("active"); btn.textContent = "✏ Draw Orchard";
    document.getElementById("draw-hint").style.display = "none";
    map.getContainer().style.cursor = "";
    document.getElementById("btn-save").disabled = true;
    setStatus("Boundary cleared.", "");
    redraw();
  }

  function toggleRadius() {
    showRadius = !showRadius;
    const btn = document.getElementById("btn-radius");
    if (showRadius) { radiusGroup.addTo(map); btn.classList.add("active"); btn.textContent = "◎ Hide 1-mi Radius"; }
    else            { map.removeLayer(radiusGroup); btn.classList.remove("active"); btn.textContent = "◎ Show 1-mi Radius"; }
  }

  async function saveBoundary() {
    if (clickPoints.length < 3) { setStatus("Need at least 3 points.", "error"); return; }
    const btn = document.getElementById("btn-save");
    btn.disabled = true; btn.textContent = "Saving...";
    try {
      const existing = await fetchBoundary();
      const payload  = { polygon_points: clickPoints, updated_at: new Date().toISOString() };
      const res = existing
        ? await sbWrite(`orchard_boundaries?id=eq.${existing.id}`, "PATCH", payload)
        : await sbWrite("orchard_boundaries", "POST", { name: "Orchard 1", ...payload });
      setStatus(res.ok ? `✓ Saved · ${clickPoints.length} points.` : `Save failed (${res.status})`, res.ok ? "success" : "error");
    } catch(e) { setStatus("Save failed: " + e.message, "error"); }
    btn.textContent = "💾 Save Boundary";
    btn.disabled = false;
  }

  // ── BOUNDARY DRAWING ─────────────────────────────────
  function redraw() {
    boundaryGroup.clearLayers();
    if (clickPoints.length === 0) return;

    // Point markers
    clickPoints.forEach((pt, i) => {
      L.circleMarker([pt.lat, pt.lng], {
        radius: i === 0 ? 8 : 6,
        color: "#FFC72C", fillColor: "#FFC72C",
        fillOpacity: 1.0, weight: 2.5
      }).addTo(boundaryGroup);
    });

    // Line between points
    if (clickPoints.length > 1) {
      const latlngs = clickPoints.map(p => [p.lat, p.lng]);
      const line    = drawingActive ? latlngs : [...latlngs, latlngs[0]];
      L.polyline(line, {
        color: "#FFC72C",
        weight: drawingActive ? 2.5 : 3,
        dashArray: drawingActive ? "6,4" : null,
        opacity: 1.0
      }).addTo(boundaryGroup);
    }

    // Filled polygon when closed
    if (!drawingActive && clickPoints.length >= 3) {
      L.polygon(clickPoints.map(p => [p.lat, p.lng]), {
        color: "#FFC72C", weight: 3,
        fillColor: "#FFC72C", fillOpacity: 0.07
      }).addTo(boundaryGroup);
    }
  }

  // ── MAP CLICK HANDLERS ───────────────────────────────
  map.on("click", function(e) {
    if (!drawingActive) return;
    clickPoints.push({ lat: e.latlng.lat, lng: e.latlng.lng });
    redraw();
    setStatus(`${clickPoints.length} point${clickPoints.length > 1 ? "s" : ""} placed. Double-click to finish.`, "");
  });

  map.on("dblclick", function(e) {
    if (!drawingActive) return;
    // Remove the extra single-click point that fires just before double-click
    if (clickPoints.length > 0) clickPoints.pop();
    finishDrawing();
  });

  // ── LOAD DATA ────────────────────────────────────────
  (async function init() {
    const locationMap = await fetchNodeLocations();
    const nodeEntries = Object.entries(locationMap);

    // Draw node markers and radius circles
    nodeEntries.forEach(([nid, coords]) => {
      // 1-mile radius circle
      L.circle(coords, {
        radius: PHEROMONE_RADIUS_M,
        color: "#ffffff", weight: 1.5,
        dashArray: "6,4",
        fillColor: "#ffffff", fillOpacity: 0.08,
        opacity: 0.55
      }).addTo(radiusGroup);

      // Radius label
      L.marker([coords[0] + 0.0135, coords[1]], {
        icon: L.divIcon({
          className: "",
          html: `<div style="font-family:monospace;font-size:10px;color:rgba(255,255,255,0.85);white-space:nowrap;transform:translateX(-50%);text-shadow:0 1px 3px rgba(0,0,0,0.8)">1 mi radius</div>`,
          iconSize: [80, 16], iconAnchor: [40, 8]
        })
      }).addTo(radiusGroup);

      // Node marker
      const numMatch = nid.match(/(\d+)$/);
      const label    = numMatch ? String(parseInt(numMatch[1], 10)) : "?";
      L.marker(coords, {
        icon: L.divIcon({
          className: "",
          html: `<div style="width:28px;height:28px;border-radius:50%;background:#dc2626;border:2px solid #fff;box-shadow:0 0 0 1px #dc2626,0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:11px;font-weight:bold;color:#fff">${label}</div>`,
          iconSize: [28,28], iconAnchor: [14,14], popupAnchor: [0,-16]
        })
      }).addTo(nodeGroup)
        .bindPopup(`<b style="font-family:monospace">${nid}</b><br>Lat: ${coords[0].toFixed(5)}<br>Lng: ${coords[1].toFixed(5)}`);
    });

    // Center map on all nodes
    if (nodeEntries.length === 1) {
      map.setView(nodeEntries[0][1], 15);
    } else if (nodeEntries.length > 1) {
      map.fitBounds(L.latLngBounds(nodeEntries.map(([,c]) => c)), { padding: [60, 60] });
    }

    // Load saved boundary
    const saved = await fetchBoundary();
    if (saved && Array.isArray(saved.polygon_points) && saved.polygon_points.length >= 3) {
      // Saved points may be stored as {longitude, latitude} from old version or {lat, lng}
      clickPoints = saved.polygon_points.map(p => ({
        lat: p.lat ?? p.latitude,
        lng: p.lng ?? p.longitude
      }));
      drawingActive = false;
      redraw();
      document.getElementById("btn-save").disabled = false;
      setStatus(`Loaded saved boundary · ${clickPoints.length} points.`, "success");
    }
  })();
</script>
</body>
</html>
