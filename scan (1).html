<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Registering Node — SmartTrap</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:      #f5f6f4;
      --surface: #ffffff;
      --border:  #e2e5e2;
      --accent:  #1a7a3c;
      --accent2: #2da653;
      --warn:    #b45309;
      --danger:  #dc2626;
      --text:    #1a1f1a;
      --muted:   #6b7a6c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .back-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 4px;
    }

    /* ── MAIN STAGE ── */
    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 0;
      text-align: center;
    }

    /* ── SPINNER / ICON ── */
    .icon-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      transition: background 0.3s, border-color 0.3s;
    }

    .icon-wrap.loading {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }
    .icon-wrap.success {
      background: #f0faf4;
      border: 1px solid #bbf7d0;
    }
    .icon-wrap.error {
      background: #fff1f1;
      border: 1px solid #fecaca;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #bfdbfe;
      border-top-color: #1d4ed8;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    .result-emoji {
      font-size: 42px;
      animation: popIn 0.4s ease forwards;
    }

    /* ── TEXT ── */
    .stage-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .stage-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 320px;
    }

    .stage-sub strong { color: var(--accent); font-weight: 500; }
    .stage-sub .warn  { color: var(--warn); }
    .stage-sub .err   { color: var(--danger); }

    /* ── STEP PILLS ── */
    .steps {
      display: flex;
      gap: 8px;
      margin-bottom: 40px;
    }

    .step {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface);
      transition: all 0.25s;
    }

    .step.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .step.done {
      background: #f0faf4;
      border-color: #bbf7d0;
      color: var(--accent);
    }

    /* ── DETAIL CARD ── */
    .detail-card {
      margin-top: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      width: 100%;
      max-width: 340px;
      text-align: left;
      display: none;
    }

    .detail-card.visible { display: block; }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .detail-row:last-child { border-bottom: none; }

    .detail-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      flex-shrink: 0;
    }

    .detail-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text);
      text-align: right;
      word-break: break-all;
    }

    .detail-value.accent { color: var(--accent); font-weight: 500; }

    /* ── ACTION BUTTONS ── */
    .actions {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 340px;
    }

    .action-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
      border: none;
    }

    .action-btn:active { opacity: 0.75; }

    .action-btn.primary {
      background: var(--accent);
      color: #fff;
    }

    .action-btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* ── ACCURACY BAR ── */
    .acc-bar-wrap {
      margin-top: 10px;
      width: 100%;
      max-width: 340px;
    }
    .acc-bar-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .acc-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .acc-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s, background 0.5s;
    }
    .name-form {
      margin-top: 28px;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .name-input {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      padding: 13px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      text-align: center;
    }
    .name-input:focus { border-color: var(--accent); background: #fff; }
    .name-hint {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">SmartTrap // Scout</div>
  <a class="back-btn" href="index.html">Dashboard</a>
</header>

<div class="stage" id="stage">

  <!-- Step pills -->
  <div class="steps">
    <div class="step" id="step-gps">GPS</div>
    <div class="step" id="step-id">Node ID</div>
    <div class="step" id="step-save">Save</div>
  </div>

  <!-- Icon -->
  <div class="icon-wrap loading" id="icon-wrap">
    <div class="spinner" id="spinner"></div>
  </div>

  <!-- Text -->
  <div class="stage-title" id="stage-title">Getting your location…</div>
  <div class="stage-sub"   id="stage-sub">Stand at the trap placement spot.<br>This only takes a moment.</div>

  <!-- Detail card (shown on success) -->
  <div class="detail-card" id="detail-card">
    <div class="detail-row">
      <div class="detail-label">Node ID</div>
      <div class="detail-value accent" id="d-nodeid">—</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Latitude</div>
      <div class="detail-value" id="d-lat">—</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Longitude</div>
      <div class="detail-value" id="d-lng">—</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">GPS Accuracy</div>
      <div class="detail-value" id="d-acc">—</div>
    </div>
  </div>

  <!-- Accuracy bar (shown after GPS fix) -->
  <div class="acc-bar-wrap" id="acc-bar-wrap" style="display:none">
    <div class="acc-bar-label">
      <span>Accuracy</span>
      <span id="acc-label-text">—</span>
    </div>
    <div class="acc-bar">
      <div class="acc-fill" id="acc-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Action buttons (shown on finish) -->
  <div class="actions" id="actions" style="display:none"></div>

</div>

<script>
  const SUPABASE_URL = "https://nqhmvymrikjnkvtxtcst.supabase.co";
  const SUPABASE_KEY = "sb_publishable_e-UEF6y_4kk-QSFb7CfzHQ_lgLVSG6l";

  // ── Supabase helpers ────────────────────────────────
  async function sbGet(path) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    if (!res.ok) throw new Error(`DB read failed (${res.status})`);
    return res.json();
  }

  async function sbPost(path, body) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify(body)
    });
    return res;
  }

  // ── Step indicator helpers ──────────────────────────
  function setStep(active) {
    // active: 'gps' | 'id' | 'save'
    const order = ['gps', 'id', 'save'];
    const idx   = order.indexOf(active);
    order.forEach((s, i) => {
      const el = document.getElementById(`step-${s}`);
      if (i < idx)       { el.className = "step done"; }
      else if (i === idx) { el.className = "step active"; }
      else                { el.className = "step"; }
    });
  }

  function setIcon(type) {
    const wrap = document.getElementById("icon-wrap");
    const spin = document.getElementById("spinner");
    wrap.className = `icon-wrap ${type}`;
    if (type === "loading") {
      spin.style.display = "block";
      spin.className = "spinner";
    } else {
      spin.style.display = "none";
    }
  }

  function showEmoji(em) {
    const wrap = document.getElementById("icon-wrap");
    const spin = document.getElementById("spinner");
    spin.style.display = "none";
    const e = document.createElement("div");
    e.className = "result-emoji";
    e.textContent = em;
    // Remove any prior emoji
    wrap.querySelectorAll(".result-emoji").forEach(x => x.remove());
    wrap.appendChild(e);
  }

  function setText(title, sub) {
    document.getElementById("stage-title").textContent = title;
    document.getElementById("stage-sub").innerHTML = sub;
  }

  function showActions(buttons) {
    const el = document.getElementById("actions");
    el.innerHTML = buttons.map(b =>
      b.href
        ? `<a class="action-btn ${b.cls}" href="${b.href}">${b.label}</a>`
        : `<button class="action-btn ${b.cls}" onclick="${b.onclick}">${b.label}</button>`
    ).join("");
    el.style.display = "flex";
  }

  // ── Main flow ───────────────────────────────────────
  async function run() {
  // ── 1. GPS ──
  setStep("gps");
  setIcon("loading");
  setText("Getting your location…", "Stand at the trap placement spot.<br>This only takes a moment.");

  let lat, lng, acc;
  try {
    ({ lat, lng, acc } = await getGPS());
  } catch (err) {
    setIcon("error");
    showEmoji("⚠️");
    setStep("gps");
    setText("Location unavailable", `<span class="err">${err.message}</span><br><br>Allow location access and try again.`);
    showActions([{ href: "scan.html", label: "↺ Try Again", cls: "primary" }]);
    return;
  }

  // Show accuracy bar
  const accPct   = Math.max(0, Math.min(100, 100 - ((acc - 3) / 97) * 100));
  const accColor = acc <= 5 ? "#4ade80" : acc <= 15 ? "#86efac" : acc <= 40 ? "#fbbf24" : "#f87171";
  const accLabel = acc <= 5 ? "Excellent" : acc <= 15 ? "Good" : acc <= 40 ? "Fair" : "Poor";
  document.getElementById("acc-bar-wrap").style.display = "block";
  document.getElementById("acc-label-text").textContent = `±${acc.toFixed(1)} m — ${accLabel}`;
  document.getElementById("acc-fill").style.width = accPct + "%";
  document.getElementById("acc-fill").style.background = accColor;

  // ── 2. Get suggested ID ──
  setStep("id");
  setIcon("loading");
  setText("Assigning node ID…", `GPS locked at<br><strong style="color:var(--accent)">${lat.toFixed(6)}, ${lng.toFixed(6)}</strong>`);

  let suggestedId;
  try {
    suggestedId = await getNextNodeId();
  } catch (err) {
    setIcon("error");
    showEmoji("⚠️");
    setText("Could not reach database", `<span class="err">${err.message}</span>`);
    showActions([{ href: "scan.html", label: "↺ Try Again", cls: "primary" }]);
    return;
  }

  // ── 3. Name input step ──
  setIcon("loading");
  showEmoji("✏️");
  document.getElementById("icon-wrap").className = "icon-wrap loading";
  setText("Name this node", `GPS locked · ±${acc.toFixed(1)} m<br>Edit the name below or keep the suggestion.`);

  // Build the name form
  const nameForm = document.createElement("div");
  nameForm.className = "name-form";
  nameForm.id = "name-form";
  nameForm.innerHTML = `
    <input class="name-input" id="name-input" type="text"
      value="${suggestedId}"
      autocomplete="off" autocorrect="off" spellcheck="false"
      placeholder="e.g. trap_node_04" />
    <div class="name-hint" id="name-hint">Letters, numbers, underscores, and hyphens only</div>
    <button class="action-btn primary" id="confirm-btn" onclick="confirmName(${lat}, ${lng}, ${acc}, '${accLabel}')">
      Confirm &amp; Save →
    </button>
  `;
  document.getElementById("stage").appendChild(nameForm);

  // Live validation
  document.getElementById("name-input").addEventListener("input", function() {
    const val  = this.value.trim();
    const hint = document.getElementById("name-hint");
    const btn  = document.getElementById("confirm-btn");
    if (!val) {
      hint.textContent = "Name cannot be empty";
      hint.style.color = "var(--danger)";
      btn.disabled = true;
    } else if (!/^[a-zA-Z0-9_\-]+$/.test(val)) {
      hint.textContent = "Only letters, numbers, underscores, and hyphens";
      hint.style.color = "var(--danger)";
      btn.disabled = true;
    } else {
      hint.textContent = "Looks good!";
      hint.style.color = "var(--accent)";
      btn.disabled = false;
    }
  });

  // Auto-focus the input
  setTimeout(() => document.getElementById("name-input")?.focus(), 100);
}

async function confirmName(lat, lng, acc, accLabel) {
  const nodeId = document.getElementById("name-input").value.trim();
  if (!nodeId || !/^[a-zA-Z0-9_\-]+$/.test(nodeId)) return;

  // Remove name form
  document.getElementById("name-form")?.remove();
  document.getElementById("actions").style.display = "none";

  // ── 4. Save ──
  setStep("save");
  setIcon("loading");
  document.getElementById("icon-wrap").querySelectorAll(".result-emoji").forEach(x => x.remove());
  document.getElementById("spinner").style.display = "block";
  setText(`Saving ${nodeId}…`, "Writing to database…");

  try {
    // Check for duplicate name
    const existing = await sbGet(`node_locations?node_id=eq.${encodeURIComponent(nodeId)}&select=node_id`);
    if (Array.isArray(existing) && existing.length > 0) {
      setIcon("error");
      showEmoji("⚠️");
      setText("Name already taken", `A node named <strong>${nodeId}</strong> already exists.<br>Go back and choose a different name.`);
      showActions([{ href: "scan.html", label: "↺ Try Again", cls: "primary" }]);
      return;
    }

    const res = await sbPost("node_locations", { node_id: nodeId, latitude: lat, longitude: lng });
    if (!res.ok && res.status !== 201) {
      const body = await res.text().catch(() => "");
      throw new Error(`HTTP ${res.status}: ${body.slice(0, 100)}`);
    }
  } catch (err) {
    setIcon("error");
    showEmoji("❌");
    setText("Save failed", `<span class="err">${err.message}</span>`);
    showActions([{ href: "scan.html", label: "↺ Try Again", cls: "primary" }]);
    return;
  }

  // ── 5. Success ──
  setIcon("success");
  showEmoji("✅");
  ["gps","id","save"].forEach(s => document.getElementById(`step-${s}`).className = "step done");
  setText("Node registered!", `<strong>${nodeId}</strong> is now live on the dashboard.`);

  document.getElementById("d-nodeid").textContent = nodeId;
  document.getElementById("d-lat").textContent    = lat.toFixed(6);
  document.getElementById("d-lng").textContent    = lng.toFixed(6);
  document.getElementById("d-acc").textContent    = `±${acc.toFixed(1)} m (${accLabel})`;
  document.getElementById("detail-card").classList.add("visible");

  showActions([
    { href: "index.html", label: "← View Dashboard", cls: "primary"   },
    { href: "scan.html",  label: "+ Register Another", cls: "secondary" }
  ]);
}

  // ── Auto-increment node ID ──────────────────────────
  async function getNextNodeId() {
    const rows = await sbGet("node_locations?select=node_id");
    let maxNum = 0;
    if (Array.isArray(rows)) {
      rows.forEach(r => {
        const m = (r.node_id || "").match(/(\d+)$/);
        if (m) maxNum = Math.max(maxNum, parseInt(m[1], 10));
      });
    }
    const next = String(maxNum + 1).padStart(2, "0");
    return `trap_node_${next}`;
  }

  // ── Kick off on load ────────────────────────────────
  run();
</script>
</body>
</html>
